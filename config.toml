# ─────────────────────────────────────────────────────────────────────────────
#  KICKR Keys — config.toml
#  Edit this file to change zones, keys, and behavior.
#  Restart the program after saving changes.
# ─────────────────────────────────────────────────────────────────────────────

[device]
# Partial name to match — find the exact name by running:  python kickr_keys.py --scan
# Common names: "KICKR CORE", "KICKR", "WAHOO KICKR"
name = "KICKR CORE"

# ─────────────────────────────────────────────────────────────────────────────
[settings]

# How many BLE readings to average before deciding the zone.
# Higher = smoother but slower to react.  Range: 1–20.
smoothing_window = 5

# Dead-band in watts — zone won't switch unless avg crosses a threshold
# boundary by this much.  Helps prevent flickering at zone edges.
dead_band_watts = 3

# ─────────────────────────────────────────────────────────────────────────────
#  POWER MAP
#
#  Each [[power_map]] block defines one zone.
#  Zones are matched highest min_watts first.
#
#  keys      — held down continuously while in this zone.
#  tap_keys  — tapped ONCE (press+release) on zone entry only.
#              Use this for toggle keys like caps_lock so they don't
#              get stuck — each zone crossing fires exactly one tap.
#  label     — display name in the console (cosmetic only)
#
#  Key names:
#    Letters/numbers:  "w"  "a"  "s"  "d"  "1"
#    Modifiers:        "alt"  "alt_l"  "alt_r"  "ctrl"  "shift"
#    Special:          "space"  "enter"  "esc"  "tab"  "caps_lock"
#    Arrows:           "up"  "down"  "left"  "right"
#    Function:         "f1" … "f12"
#
#  ── Skyrim defaults ──
#  Walk:    Caps Lock toggles walk mode; W moves forward
#  Run:     Caps Lock off; W moves forward
#  Sprint:  W + Alt (held)
# ─────────────────────────────────────────────────────────────────────────────

[[power_map]]
min_watts = 0
keys      = []
tap_keys  = []
label     = "Idle"

[[power_map]]
min_watts = 50
keys      = ["w"]
tap_keys  = ["caps_lock"]   # tapped once entering Walk — toggles walk mode ON
label     = "Walk"

[[power_map]]
min_watts = 100
keys      = ["w"]
tap_keys  = ["caps_lock"]   # tapped once entering Run — toggles walk mode OFF
label     = "Run"

[[power_map]]
min_watts = 150
keys      = ["w", "alt"]
tap_keys  = []
label     = "Sprint"


# ─────────────────────────────────────────────────────────────────────────────
#  EXAMPLES — uncomment or add your own blocks freely.
# ─────────────────────────────────────────────────────────────────────────────

# Sneak zone (Ctrl = sneak in Skyrim):
# [[power_map]]
# min_watts = 30
# keys      = ["ctrl", "w"]
# tap_keys  = []
# label     = "Sneak"

# Different game — Shift to run:
# [[power_map]]
# min_watts = 100
# keys      = ["shift", "w"]
# tap_keys  = []
# label     = "Run (Shift)"
